services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: webstudio
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgREST ───────────────────────────────────────────────────────────────
  postgrest:
    image: postgrest/postgrest:v12.2.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      PGRST_DB_URI: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/webstudio
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${PGRST_JWT_SECRET}
      PGRST_DB_SCHEMAS: public

  # ── Schema migrations ───────────────────────────────────────────────────────
  # Runs once on every `docker compose up`; exits 0 when all SQL migrations are
  # applied.  The `app` service waits for this to complete successfully.
  migrate:
    image: ${BUILDER_IMAGE:-ghcr.io/webstudio-is/builder:latest}
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    # Override the image entrypoint so only migrations run (no server start).
    entrypoint:
      - /prisma/node_modules/.bin/prisma
      - migrate
      - deploy
      - --schema=/app/prisma/schema.prisma
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/webstudio
      DIRECT_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/webstudio

  # ── Webstudio builder ───────────────────────────────────────────────────────
  app:
    image: ${BUILDER_IMAGE:-ghcr.io/webstudio-is/builder:latest}
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      POSTGREST_URL: http://postgrest:3000
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL:-${DATABASE_URL}}
      AUTH_SECRET: ${AUTH_SECRET}
      DEV_LOGIN: ${DEV_LOGIN:-}
      DEV_LOGIN_EMAIL: ${DEV_LOGIN_EMAIL:-}
      GH_CLIENT_ID: ${GH_CLIENT_ID:-}
      GH_CLIENT_SECRET: ${GH_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      POSTGREST_API_KEY: ${POSTGREST_API_KEY:-}
      PGRST_JWT_SECRET: ${PGRST_JWT_SECRET}
      FEATURES: ${FEATURES:-*}
      USER_PLAN: ${USER_PLAN:-pro}
      MAX_ASSETS_PER_PROJECT: ${MAX_ASSETS_PER_PROJECT:-50}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
    volumes:
      - uploads:/app/public/s/uploads

volumes:
  db-data:
  uploads:
