services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      - POSTGRES_PASSWORD=${SERVICE_PASSWORD_DB}
      - POSTGRES_DB=${POSTGRES_DB:-webstudio}
    volumes:
      - db-data:/var/lib/postgresql/data
    configs:
      - source: postgres_init
        target: /docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgREST ───────────────────────────────────────────────────────────────
  postgrest:
    image: postgrest/postgrest:v12.2.0
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      - PGRST_DB_URI=postgresql://postgres:${SERVICE_PASSWORD_DB}@db:5432/webstudio
      - PGRST_DB_ANON_ROLE=anon
      - PGRST_JWT_SECRET=${SERVICE_BASE64_64_PGRST}
      - PGRST_DB_SCHEMAS=public

  # ── Database setup ──────────────────────────────────────────────────────────
  # Runs on every deployment to ensure the anon role and privileges exist.
  # Safe to run multiple times (idempotent).
  db-setup:
    image: postgres:15-alpine
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        psql "postgresql://postgres:${SERVICE_PASSWORD_DB}@db:5432/webstudio" \
          -c "DO \$\$ BEGIN IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'anon') THEN CREATE ROLE anon NOLOGIN; END IF; END \$\$;" \
          -c "GRANT USAGE ON SCHEMA public TO anon;" \
          -c "GRANT ALL ON ALL TABLES IN SCHEMA public TO anon;" \
          -c "GRANT ALL ON ALL SEQUENCES IN SCHEMA public TO anon;" \
          -c "ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO anon;" \
          -c "ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO anon;"

  # ── Schema migrations ───────────────────────────────────────────────────────
  migrate:
    image: ${BUILDER_IMAGE:-ghcr.io/webstudio-is/builder:latest}
    restart: "no"
    depends_on:
      db-setup:
        condition: service_completed_successfully
    entrypoint:
      - /prisma/node_modules/.bin/prisma
      - migrate
      - deploy
      - --schema=/app/prisma/schema.prisma
    environment:
      DATABASE_URL: postgresql://postgres:${SERVICE_PASSWORD_DB}@db:5432/webstudio
      DIRECT_URL: postgresql://postgres:${SERVICE_PASSWORD_DB}@db:5432/webstudio

  # ── Webstudio builder ───────────────────────────────────────────────────────
  app:
    image: ${BUILDER_IMAGE:-ghcr.io/webstudio-is/builder:latest}
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      # Coolify magic variables — auto-generated by Coolify, no manual setup needed:
      #   SERVICE_FQDN_APP_3000   → domain configured in Coolify UI, routed to port 3000
      #   SERVICE_PASSWORD_DB     → strong random password shared with db/postgrest/migrate
      #   SERVICE_PASSWORD_AUTH   → strong random password for session signing
      #   SERVICE_BASE64_64_PGRST → 64-char random secret shared with postgrest
      - SERVICE_FQDN_APP_3000
      - NODE_ENV=production
      - PORT=3000
      - POSTGREST_URL=http://postgrest:3000
      - DATABASE_URL=postgresql://postgres:${SERVICE_PASSWORD_DB}@db:5432/webstudio
      - DIRECT_URL=postgresql://postgres:${SERVICE_PASSWORD_DB}@db:5432/webstudio
      - AUTH_SECRET=${SERVICE_PASSWORD_AUTH}
      # DEV_LOGIN enables password-less login (password = AUTH_SECRET value).
      # Remove DEV_LOGIN and set GH_CLIENT_ID/GH_CLIENT_SECRET for OAuth.
      - DEV_LOGIN=${DEV_LOGIN:-true}
      - DEV_LOGIN_EMAIL=${DEV_LOGIN_EMAIL:-admin@example.com}
      - GH_CLIENT_ID=${GH_CLIENT_ID:-}
      - GH_CLIENT_SECRET=${GH_CLIENT_SECRET:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - PGRST_JWT_SECRET=${SERVICE_BASE64_64_PGRST:-}
      - FEATURES=${FEATURES:-*}
      - USER_PLAN=${USER_PLAN:-pro}
      - MAX_ASSETS_PER_PROJECT=${MAX_ASSETS_PER_PROJECT:-50}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_REGION=${S3_REGION:-}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID:-}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY:-}
      - S3_BUCKET=${S3_BUCKET:-}
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').createConnection(3000,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - uploads:/app/public/s/uploads

configs:
  postgres_init:
    content: |
      CREATE SCHEMA IF NOT EXISTS extensions;
      CREATE EXTENSION IF NOT EXISTS "uuid-ossp" SCHEMA extensions;
      ALTER DATABASE webstudio SET search_path TO "$$user", public, extensions;
      CREATE ROLE anon NOLOGIN;
      GRANT USAGE ON SCHEMA public TO anon;
      ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO anon;
      ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO anon;

volumes:
  db-data:
  uploads:
