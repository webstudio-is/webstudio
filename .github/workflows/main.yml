name: Main workflow

on:
  push:
    branches:
      - main
  pull_request:
  pull_request_target:
    types: [labeled]

# cancel in-progress runs on new commits to same PR (gitub.event.number)
concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read # to fetch code (actions/checkout)

jobs:
  checks:
    # Run on push, regular PR (for repo branches), or labeled PR with safe-to-deploy (for forks)
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'pull_request_target' && github.event.label.name == 'safe-to-deploy')

    timeout-minutes: 20

    strategy:
      matrix:
        environment:
          - empty
          - development

    environment:
      name: ${{ matrix.environment }}

    env:
      DATABASE_URL: postgres://
      AUTH_SECRET: test

    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      # Will not checkout submodules on empty environment, and will on development
      - uses: ./.github/actions/submodules-checkout
        with:
          submodules-ssh-key: ${{ secrets.PRIVATE_GITHUB_DEPLOY_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Pnpm install
        run: |
          pnpm install

      - uses: actions/cache@v4
        with:
          path: |
            ./node_modules/.cache/prettier/.prettier-cache
          key: checks-${{ github.sha }}
          restore-keys: checks-

      - run: echo ===SHA USED=== ${{ github.event.pull_request.head.sha || github.sha }} # todo: remove after check whats happening on main

      - run: |
          pnpm prettier --cache --check "**/*.{js,md,ts,tsx}"

      - name: Lint
        run: |
          pnpm lint

      - name: Package boundaries
        run: |
          pnpm check:package-boundaries

      - name: Generated API contracts
        run: |
          pnpm check:generated-api

      - name: Generated CLI docs
        run: |
          pnpm check:generated-docs

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Playwright init
        run: |
          pnpm playwright install
        working-directory: packages/sdk-components-animation

      - name: Test
        run: |
          pnpm -r test

      - name: Typecheck
        run: |
          pnpm -r typecheck

  check-size:
    runs-on: ubuntu-24.04-arm

    environment:
      name: development

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: ./.github/actions/submodules-checkout
        with:
          submodules-ssh-key: ${{ secrets.PRIVATE_GITHUB_DEPLOY_TOKEN }}

      - uses: ./.github/actions/ci-setup

      - run: pnpm --filter "{./fixtures/*}..." build

      - uses: actions/github-script@v7
        with:
          script: |
            const assertSize = async (directory, maxSize) => {
              let result = ''
              await exec.exec('du', ['-sk', directory], {
                silent: true,
                listeners: {
                  stdout: (data) => {
                    result += data.toString()
                  }
                }
              })
              const size = Number.parseInt(result, 10)
              return {
                passed: size <= maxSize,
                size,
                diff: size - maxSize,
                directory,
              }
            }
            const results = [
              await assertSize('./fixtures/ssg-cloudflare-pages/dist/client', 356),
              await assertSize('./fixtures/react-router-netlify/build/client', 376),
              await assertSize('./fixtures/webstudio-features/build/client', 3312),
            ]
            for (const result of results) {
              if (result.passed) {
                console.info(`${result.directory}: ${result.size}kB (${result.diff}kB)`)
              } else {
                console.info('')
                console.error(`${result.directory}: ${result.size}kB (+${result.diff}kB)`)
              }
            }
            if (results.some(result => result.passed === false)) {
              console.error('Some fixtures exceeded limits')
              process.exit(1)
            }

  builder-e2e:
    name: builder-e2e (${{ matrix.name }})
    # Run on push, regular PR (for repo branches), or labeled PR with safe-to-deploy (for forks)
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'pull_request_target' && github.event.label.name == 'safe-to-deploy')

    timeout-minutes: 40

    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: runtime
            e2e-filters: |
              animation runtime
              data variables runtime
              props runtime
              project settings runtime
          - name: content-basic
            e2e-filters: |
              Editor can insert content templates with assets and styles
              Editor can upload, replace, and delete asset in content mode
              Editor can replace image source with asset in content mode
              Editor can delete direct children but not protected containers
              Editor can edit text and content props but not design props
          - name: content-pages
            e2e-filters: |
              Editor rich text formatting persists after reload
              Editor can create styled page from template in content mode
              Editor can edit allowed page settings
              Editor is blocked from invalid paths and restricted page settings
              Edit-only and build-capable users can collaborate in content mode
          - name: pages-components
            e2e-filters: |
              Builder can insert through the engine bridge, undo, redo, and reload
              Builder Components panel filters catalog-only entries and inserts a persisted component
              Builder can duplicate a component through the engine bridge, undo, redo, and reload
              Builder can duplicate and delete a component from Navigator context menu
              Builder Navigator keyboard move, reparent, and reorder persist after reload
          - name: pages-commands
            e2e-filters: |
              Builder command panel structural mutations persist after reload
              Builder Navigator label and command unwrap persist after reload
              Builder command panel tag insertion persists after reload
              Builder pastes external HTML fragments through clipboard and reloads them
          - name: pages-tree
            e2e-filters: |
              Builder can copy, duplicate, and delete a page from the header menu
              Builder can copy, duplicate, and delete a folder from the context menu
              Builder can copy, duplicate, and delete a page template from actions menus
          - name: style
            e2e-filters: |
              style panel runtime
          - name: permissions-and-keyboard
            e2e-filters: |
              preview links
              share link permissions
              slot keyboard

    environment:
      name: development

    env:
      BUILDER_E2E_COMPOSE_ARGS: "--env-file apps/builder/.env -f apps/builder/docker-compose.yaml -f apps/builder/docker-compose.e2e.yaml"

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: ./.github/actions/submodules-checkout
        with:
          submodules-ssh-key: ${{ secrets.PRIVATE_GITHUB_DEPLOY_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Pnpm install
        run: pnpm install

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: builder-e2e-playwright-${{ runner.os }}-${{ hashFiles('apps/builder/package.json', 'pnpm-lock.yaml') }}

      - name: Run builder e2e
        env:
          E2E_TEST_FILTERS: ${{ matrix.e2e-filters }}
        run: |
          E2E_SKIP_CLEANUP=true E2E_TEST_COMMAND_TIMEOUT_SECONDS=300 pnpm e2e:builder

      - name: Print e2e service logs
        if: failure()
        run: docker compose $BUILDER_E2E_COMPOSE_ARGS logs

      - name: Stop e2e services
        if: always()
        run: docker compose $BUILDER_E2E_COMPOSE_ARGS down --volumes --remove-orphans
