name: Docker — Build & Publish

on:
  push:
    branches:
      - develop
  release:
    types: [published]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  docker:
    name: Build builder image
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write   # required for ghcr.io push

    steps:
      - uses: actions/checkout@v4

      # ARM64 support via QEMU (enables Raspberry Pi builds)
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      # Login to GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Sanitize branch name for use as image tag (workflow_dispatch only)
      - name: Compute branch tag
        id: branch
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          SAFE=$(echo "$BRANCH" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/-\+/-/g' | sed 's/^-//;s/-$//')
          if [[ "$BRANCH" == "develop" ]]; then
            echo "is_main=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_main=false" >> "$GITHUB_OUTPUT"
          fi
          echo "tag=$SAFE" >> "$GITHUB_OUTPUT"

      # Derive image tags:
      #   push to develop               → :latest
      #   workflow_dispatch on develop  → :latest
      #   workflow_dispatch on other    → :<sanitized-branch>
      #   published release             → :<version> + :latest
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/builder
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/develop' || github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && steps.branch.outputs.is_main == 'true') }}
            type=raw,value=${{ steps.branch.outputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' && steps.branch.outputs.is_main == 'false' }}
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.event_name == 'release' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/builder/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=${{ github.ref_name }}
            type=gha,scope=develop
          cache-to: type=gha,mode=max,scope=${{ github.ref_name }}

