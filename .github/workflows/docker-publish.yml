name: Docker — Build & Publish

on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:

jobs:
  docker:
    name: Build multi-arch image
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write   # required for ghcr.io push

    steps:
      - uses: actions/checkout@v4

      # ARM64 support via QEMU (enables Raspberry Pi builds)
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      # Login to Docker Hub (optional, for mirroring to Docker Hub)
      # Set DOCKERHUB_USERNAME as a repository variable (Settings > Variables)
      # and DOCKERHUB_TOKEN as a repository secret (Settings > Secrets).
      - name: Log in to Docker Hub
        if: vars.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Login to GitHub Container Registry (primary registry)
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive image tags:
      #   push to main  → :latest
      #   published release → :<tag> + :latest
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/builder
            ${{ vars.DOCKERHUB_USERNAME != '' && format('{0}/webstudio-builder', vars.DOCKERHUB_USERNAME) || '' }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.event_name == 'release' || github.event_name == 'workflow_dispatch' }}
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.event_name == 'release' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/builder/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
