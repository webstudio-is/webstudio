name: Sync upstream

on:
  schedule:
    - cron: '0 8 * * 1' # every Monday at 8am UTC
  workflow_dispatch:

jobs:
  sync-main:
    name: Sync main with upstream
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      has_new_commits: ${{ steps.sync.outputs.has_new_commits }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.WORKFLOW_PAT }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync with upstream
        id: sync
        run: |
          git remote add upstream https://github.com/webstudio-is/webstudio.git
          git fetch upstream main
          BEFORE=$(git rev-parse HEAD)
          git reset --hard upstream/main
          AFTER=$(git rev-parse HEAD)
          if [ "$BEFORE" != "$AFTER" ]; then
            echo "has_new_commits=true" >> "$GITHUB_OUTPUT"
            git push --force-with-lease origin main
            echo "main synced with upstream"
          else
            echo "has_new_commits=false" >> "$GITHUB_OUTPUT"
            echo "main already up to date"
          fi

  rebase-develop:
    name: Rebase develop onto main
    needs: sync-main
    if: needs.sync-main.outputs.has_new_commits == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9.14.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Rebase develop onto main
        id: rebase
        continue-on-error: true
        run: |
          git fetch origin main

          rebase_with_lockfile_fix() {
            git rebase origin/main && return 0

            CONFLICTS=$(git diff --name-only --diff-filter=U)
            if [ "$CONFLICTS" = "pnpm-lock.yaml" ]; then
              echo "Auto-resolving pnpm-lock.yaml conflict..."
              git checkout --ours -- pnpm-lock.yaml
              pnpm install --no-frozen-lockfile
              git add pnpm-lock.yaml
              GIT_EDITOR=true git rebase --continue
              return $?
            fi

            return 1
          }

          rebase_with_lockfile_fix
          git push origin develop --force-with-lease

      - name: Create PR on rebase conflict
        if: steps.rebase.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git rebase --abort || true
          BRANCH="sync/upstream-$(date +%Y%m%d)"
          git checkout -b "$BRANCH" origin/main
          git push origin "$BRANCH"
          gh pr create \
            --title "chore(sync): merge upstream into develop (conflicts to resolve)" \
            --body "The automatic rebase of \`develop\` onto \`main\` failed due to conflicts.

          Please resolve the conflicts locally and merge this PR to complete the upstream sync:

          \`\`\`bash
          git fetch origin
          git checkout develop
          git rebase origin/main
          # resolve conflicts, then:
          git push origin develop --force-with-lease
          \`\`\`" \
            --base develop \
            --head "$BRANCH"

      - name: Fail if rebase did not succeed
        if: steps.rebase.outcome == 'failure'
        run: exit 1
